<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile-first viewport — prevents user scaling to protect the app's UDL layout -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- PWA / home screen installation -->
    <meta name="application-name" content="Art of Friendship" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Art of Friendship" />
    <meta name="theme-color" content="#1B3A5C" />
    <link rel="manifest" href="/art-of-friendship/manifest.json" />

    <!-- Favicon (emoji fallback — replace with a proper icon if desired) -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>"
    />

    <title>The Art of Friendship</title>

    <style>
      /* Reset */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root {
        height: 100%;
        width: 100%;
      }

      body {
        background-color: #EEF2F6;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Prevent overscroll / rubber-band effect on iOS */
        overscroll-behavior: none;
      }

      /* Remove default button/input styles */
      button { font-family: inherit; }
      input, textarea { font-family: inherit; }

      /* Prevent iOS tap highlight */
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
