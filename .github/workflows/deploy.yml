name: Deploy Art of Friendship to GitHub Pages

on:
  # Runs on every push to the main branch
  push:
    branches: [ main ]
  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Required permissions for the GitHub Pages deployment action
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repository ─────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build the app ─────────────────────────────────────────────────
      # VITE_ANTHROPIC_API_KEY is optional.
      # Add it as a GitHub Secret (Settings → Secrets → Actions) named
      # VITE_ANTHROPIC_API_KEY to enable the AI Scenario Generator.
      # Without it, the generator uses the built-in template fallback.
      - name: Build
        run: npm run build
        env:
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}

      # ── 5. Upload the built files as a Pages artifact ────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # ── 6. Deploy to GitHub Pages ────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
